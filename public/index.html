<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercury Marketing · Leadership View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --surface-warm: #faf9f6;
      --border: #e8e5df;
      --border-strong: #d4cfc6;
      --text: #1a1916;
      --text-2: #4a4740;
      --text-3: #8a8680;
      --text-4: #b8b4ae;
      --ink: #1a1916;
      --green: #2a7a4a;
      --yellow: #b07a10;
      --red: #b03020;
      --blue: #2d5a9e;
      --gray: #8a8680;
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── LOADING STATE ─── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: rgba(255,255,255,0.9);
    }

    .loading-bar-track {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
      animation: loadBar 2s ease-in-out infinite;
    }

    @keyframes loadBar {
      0% { width: 0%; }
      50% { width: 80%; }
      100% { width: 100%; }
    }

    .loading-status {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── ERROR BANNER ─── */
    #error-banner {
      display: none;
      background: #fde8e8;
      border-bottom: 1px solid #f5c0c0;
      padding: 10px 48px;
      font-size: 12.5px;
      color: var(--red);
    }

    /* ─── HEADER ─── */
    header {
      background: var(--ink);
      color: #f5f4f1;
      padding: 0 48px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-left { display: flex; align-items: center; gap: 24px; }

    .wordmark {
      font-family: 'Instrument Serif', serif;
      font-size: 17px;
      color: #f5f4f1;
    }

    .header-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.15); }

    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
    }

    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ─── HORIZON TABS ─── */
    .horizon-nav {
      background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 48px;
      display: flex;
    }

    .horizon-tab {
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .horizon-tab:hover { color: rgba(255,255,255,0.65); }
    .horizon-tab.active { color: #f5f4f1; border-bottom-color: #f5f4f1; }

    /* ─── LAYOUT ─── */
    .page-body {
      max-width: 1400px;
      margin: 0 auto;
      padding: 36px 48px 80px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      align-items: start;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: sticky;
      top: 106px;
      padding-right: 32px;
      padding-top: 4px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-4);
      margin-bottom: 10px;
      padding-left: 10px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12.5px;
      color: var(--text-3);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.12s;
      margin-bottom: 2px;
    }

    .sidebar-link:hover, .sidebar-link.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
    }

    .sidebar-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .sidebar-count {
      margin-left: auto;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-4);
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ─── MAIN ─── */
    .main-content { min-width: 0; }

    /* ─── SUMMARY STRIP ─── */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .summary-label {
      font-size: 10.5px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    .summary-number {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      line-height: 1;
      color: var(--text);
    }

    .summary-sub { font-size: 11px; color: var(--text-4); margin-top: 4px; }

    /* ─── CHANNEL SECTION ─── */
    .channel-section {
      margin-bottom: 28px;
      scroll-margin-top: 120px;
    }

    .channel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border);
    }

    .channel-stripe { width: 3px; height: 22px; border-radius: 2px; flex-shrink: 0; }

    .channel-title {
      font-family: 'Instrument Serif', serif;
      font-size: 19px;
      color: var(--text);
      line-height: 1;
    }

    .channel-meta { font-size: 11.5px; color: var(--text-3); margin-left: 4px; }

    .channel-summary-pills { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    .pill-green { background: #e8f5ee; color: var(--green); }
    .pill-yellow { background: #fdf3dc; color: var(--yellow); }
    .pill-gray { background: #f0ede8; color: var(--gray); }
    .pill-blue { background: #e8eef8; color: var(--blue); }

    /* ─── PROJECT TABLE ─── */
    .projects-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .project-row {
      display: grid;
      grid-template-columns: 1fr 90px 130px 110px 180px;
      align-items: start;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      gap: 12px;
    }

    .project-row:last-child { border-bottom: none; }
    .project-row:hover { background: var(--surface-warm); }

    .project-row.header-row {
      background: var(--surface-warm);
      padding: 9px 18px;
      border-bottom: 1px solid var(--border);
    }

    .project-row.header-row span {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-4);
    }

    .project-row.dimmed { opacity: 0.55; }

    .proj-name-col { display: flex; flex-direction: column; gap: 3px; }

    .proj-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .proj-name a { color: inherit; text-decoration: none; }
    .proj-name a:hover { text-decoration: underline; }

    .proj-next { font-size: 11.5px; color: var(--text-3); line-height: 1.35; }

    .proj-horizon-badge {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      margin-top: 2px;
      width: fit-content;
    }

    .badge-now     { background: #e8f5ee; color: var(--green); }
    .badge-soon    { background: #fdf3dc; color: var(--yellow); }
    .badge-future  { background: #f0ede8; color: var(--gray); }
    .badge-planning{ background: #ece8f5; color: #6b4a9e; }
    .badge-complete{ background: #f0ede8; color: var(--gray); }

    .proj-tier {
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-3);
    }

    .proj-status { display: flex; align-items: center; gap: 7px; font-size: 12px; }

    .status-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .s-on_track    .status-pip { background: var(--green); }
    .s-in_progress .status-pip { background: var(--yellow); }
    .s-complete    .status-pip { background: #aaa; }
    .s-not_started .status-pip { background: transparent; border: 1.5px solid var(--text-4); }
    .s-planning    .status-pip { background: #6b4a9e; }
    .s-unknown     .status-pip { background: #ccc; }

    .s-on_track    .status-text { color: var(--green); }
    .s-in_progress .status-text { color: var(--yellow); }
    .s-complete    .status-text { color: #aaa; }
    .s-not_started .status-text { color: var(--gray); }
    .s-planning    .status-text { color: #6b4a9e; }
    .s-unknown     .status-text { color: #aaa; }

    .proj-due {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--text-3);
    }

    .proj-due.overdue { color: var(--red); font-weight: 500; }
    .proj-due.soon    { color: var(--yellow); font-weight: 500; }

    .proj-progress { display: flex; flex-direction: column; gap: 5px; }

    .prog-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10.5px;
      color: var(--text-4);
      font-family: 'JetBrains Mono', monospace;
    }

    .prog-track { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

    /* ─── HORIZON DIVIDER ─── */
    .horizon-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .horizon-divider-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-4);
      white-space: nowrap;
    }

    .horizon-divider-line { flex: 1; height: 1px; background: var(--border); }

    /* ─── EVENTS ─── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.1s;
    }

    .event-card:hover { border-color: var(--border-strong); }

    .event-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #6b4a9e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .event-name { font-size: 12.5px; font-weight: 500; color: var(--text); line-height: 1.3; }

    /* ─── SKELETON ─── */
    .skeleton-row {
      display: grid;
      grid-template-columns: 1fr 90px 130px 110px 180px;
      padding: 16px 18px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .skel {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, #f0ede8 25%, #e8e5df 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1100px) {
      .page-body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    @media (max-width: 900px) {
      .project-row { grid-template-columns: 1fr 80px 100px; }
      .project-row > *:nth-child(4),
      .project-row > *:nth-child(5) { display: none; }
      .summary-strip { grid-template-columns: repeat(3, 1fr); }
      .events-grid { grid-template-columns: repeat(2, 1fr); }
      .page-body, header, .horizon-nav { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">Mercury Marketing</div>
  <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
  <div class="loading-status" id="loading-status">Fetching from Asana…</div>
</div>

<!-- ERROR -->
<div id="error-banner"></div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="wordmark">Mercury Marketing</div>
    <div class="header-sep"></div>
    <div class="header-subtitle">Leadership View</div>
  </div>
  <div class="live-pill">
    <div class="live-dot"></div>
    <span id="ts">Live from Asana</span>
  </div>
</header>

<!-- HORIZON TABS -->
<div class="horizon-nav">
  <div class="horizon-tab active" data-filter="all">All</div>
  <div class="horizon-tab" data-filter="now">Now (Apr–May)</div>
  <div class="horizon-tab" data-filter="soon">Soon (Jun–Aug)</div>
  <div class="horizon-tab" data-filter="future">Future (Sep+)</div>
  <div class="horizon-tab" data-filter="planning">Planning</div>
</div>

<div class="page-body">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-label">Channels</div>
    <a class="sidebar-link active" href="#launches">
      <div class="sidebar-dot" style="background:#1a1916"></div>
      Launches (T1 / T2)
      <span class="sidebar-count" id="count-launches">—</span>
    </a>
    <a class="sidebar-link" href="#perf">
      <div class="sidebar-dot" style="background:#2d5a9e"></div>
      Performance Mktg
      <span class="sidebar-count" id="count-perf">—</span>
    </a>
    <a class="sidebar-link" href="#lifecycle">
      <div class="sidebar-dot" style="background:#1a6b4a"></div>
      Lifecycle
      <span class="sidebar-count" id="count-lifecycle">—</span>
    </a>
    <a class="sidebar-link" href="#brand">
      <div class="sidebar-dot" style="background:#8b3a6e"></div>
      Brand Studio
      <span class="sidebar-count" id="count-brand">—</span>
    </a>
    <a class="sidebar-link" href="#social">
      <div class="sidebar-dot" style="background:#c45c1a"></div>
      Organic Social
      <span class="sidebar-count" id="count-social">—</span>
    </a>
    <a class="sidebar-link" href="#events">
      <div class="sidebar-dot" style="background:#6b4a9e"></div>
      Events
      <span class="sidebar-count" id="count-events">—</span>
    </a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Operations</div>
    <a class="sidebar-link" href="#ops">
      <div class="sidebar-dot" style="background:#4a6b1a"></div>
      Strat Ops
      <span class="sidebar-count" id="count-ops">—</span>
    </a>
  </nav>

  <!-- MAIN -->
  <div class="main-content" id="main-content">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
const TODAY = new Date();
const CHANNEL_CONFIG = {
  launches:  { label: 'Launches',              meta: 'T1 & T2 · Product GTM',              color: '#1a1916' },
  perf:      { label: 'Performance Marketing', meta: 'Paid · Meta · Search · New Channels', color: '#2d5a9e' },
  lifecycle: { label: 'Lifecycle',             meta: 'Email · In-app · Push · Nurture',     color: '#1a6b4a' },
  brand:     { label: 'Brand Studio',          meta: 'Design · Copy · Requests',            color: '#8b3a6e' },
  social:    { label: 'Organic Social',        meta: 'Instagram · LinkedIn · Calendar',     color: '#c45c1a' },
  events:    { label: 'Events',                meta: 'Dinners · Partnerships · Community',  color: '#6b4a9e' },
  ops:       { label: 'Strat Ops',             meta: 'Infrastructure · Process · Tooling',  color: '#4a6b1a' },
};

const CHANNEL_ORDER = ['launches','perf','lifecycle','brand','social','events','ops'];

// ─── Horizon groupings ───────────────────────────────────────────────────────
const HORIZON_GROUPS = {
  launches: [
    { key: 'now',      label: 'In flight — Now'           },
    { key: 'complete', label: 'Wrapping up — Complete'    },
    { key: 'future',   label: 'On the horizon — Planning' },
    { key: 'planning', label: 'On the horizon — Planning' },
    { key: 'soon',     label: 'Soon'                      },
  ],
};

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return { text: '—', cls: '' };
  const date = new Date(d + 'T00:00:00');
  const diff = Math.round((date - TODAY) / 86400000);
  const text = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff < 0) return { text, cls: 'overdue' };
  if (diff <= 10) return { text, cls: 'soon' };
  return { text, cls: '' };
}

function statusLabel(s) {
  return { on_track:'On Track', in_progress:'In Progress', complete:'Complete',
           not_started:'Not Started', planning:'Planning', unknown:'Unknown' }[s] || s;
}

function badgeClass(h) {
  return { now:'badge-now', soon:'badge-soon', future:'badge-future',
           planning:'badge-planning', complete:'badge-complete' }[h] || 'badge-planning';
}

function badgeText(h, due) {
  if (h === 'now') return 'Now';
  if (h === 'complete') return 'Done';
  if (h === 'planning') return 'Planning';
  if (h === 'soon') return 'Soon';
  if (h === 'future') {
    if (due) {
      const d = new Date(due + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }
    return 'Future';
  }
  return h;
}

// ─── Render one project row ──────────────────────────────────────────────────
function renderRow(p, channelColor, isDimmed) {
  const nextTask = p.upcoming_tasks[0];
  const nextText = nextTask
    ? nextTask.name + (nextTask.due ? ` · ${fmtDate(nextTask.due).text}` : '')
    : (p.status === 'complete' ? 'All tasks complete' : 'No upcoming tasks logged');

  const due = p.due_on ? fmtDate(p.due_on) : { text: '—', cls: '' };

  return `
    <div class="project-row ${isDimmed ? 'dimmed' : ''}" data-horizon="${p.horizon}">
      <div class="proj-name-col">
        <div class="proj-name">
          ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">${p.name}</a>` : p.name}
        </div>
        <div class="proj-next">${nextText}</div>
        <span class="proj-horizon-badge ${badgeClass(p.horizon)}">${badgeText(p.horizon, p.due_on)}</span>
      </div>
      <div class="proj-tier">${p.tier}</div>
      <div class="proj-status s-${p.status}">
        <div class="status-pip"></div>
        <span class="status-text">${statusLabel(p.status)}</span>
      </div>
      <div class="proj-due ${due.cls}">${due.text}</div>
      <div class="proj-progress">
        <div class="prog-labels">
          <span>${p.pct_complete}%</span>
          <span>${p.completed_tasks}/${p.total_tasks}</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" style="width:${p.pct_complete}%;background:${p.status === 'complete' ? '#aaa' : channelColor}"></div>
        </div>
      </div>
    </div>`;
}

// ─── Render one channel section ──────────────────────────────────────────────
function renderChannel(channelKey, projects) {
  const cfg = CHANNEL_CONFIG[channelKey];
  if (!projects.length) return '';

  // Summary pills
  const inFlight  = projects.filter(p => p.status === 'in_progress' || p.status === 'on_track').length;
  const complete  = projects.filter(p => p.status === 'complete').length;
  const planning  = projects.filter(p => p.status === 'planning' || p.status === 'not_started').length;

  const pills = [
    complete  ? `<span class="pill pill-gray">${complete} complete</span>`  : '',
    inFlight  ? `<span class="pill pill-yellow">${inFlight} in flight</span>` : '',
    planning  ? `<span class="pill pill-blue">${planning} planning</span>`   : '',
  ].filter(Boolean).join('');

  // Events channel — special card grid layout
  if (channelKey === 'events') {
    const sorted = [...projects[0].upcoming_tasks].sort((a,b) =>
      (a.due||'9').localeCompare(b.due||'9'));
    const cards = sorted.map(t => {
      const d = t.due ? new Date(t.due + 'T00:00:00').toLocaleDateString('en-US',
        { weekday: 'short', month: 'short', day: 'numeric' }) : 'TBD';
      return `<div class="event-card">
        <div class="event-date">${d}</div>
        <div class="event-name">${t.name}</div>
      </div>`;
    }).join('');

    return `
      <div class="channel-section" id="${channelKey}">
        <div class="channel-header">
          <div class="channel-stripe" style="background:${cfg.color}"></div>
          <div class="channel-title">${cfg.label}</div>
          <div class="channel-meta">${cfg.meta}</div>
          <div class="channel-summary-pills">${pills}</div>
        </div>
        <div class="events-grid">${cards || '<p style="color:var(--text-4);font-size:12px">No upcoming events</p>'}</div>
      </div>`;
  }

  // All other channels — determine if we need horizon sub-dividers (only launches)
  let rowsHtml = '';

  if (channelKey === 'launches') {
    const groups = [
      { key: 'now',      label: 'In flight — Now',             dimmed: false },
      { key: 'complete', label: 'Wrapping up — Complete',      dimmed: true  },
      { key: 'future',   label: 'On the horizon',              dimmed: true  },
      { key: 'planning', label: 'On the horizon',              dimmed: true  },
      { key: 'soon',     label: 'Coming up',                   dimmed: true  },
    ];

    const seen = new Set();
    groups.forEach(g => {
      const ps = projects.filter(p => p.horizon === g.key);
      if (!ps.length) return;

      const dividerKey = g.label;
      if (!seen.has(dividerKey)) {
        seen.add(dividerKey);
        rowsHtml += `
          <div class="horizon-divider">
            <span class="horizon-divider-label">${g.label}</span>
            <div class="horizon-divider-line"></div>
          </div>`;
      }
      rowsHtml += `<div class="projects-table">`;
      ps.forEach(p => { rowsHtml += renderRow(p, cfg.color, g.dimmed); });
      rowsHtml += `</div>`;
    });
  } else {
    rowsHtml = `
      <div class="projects-table">
        <div class="project-row header-row">
          <span>Project / Focus</span><span>Tier</span><span>Status</span><span>Next Due</span><span>Progress</span>
        </div>
        ${projects.map(p => renderRow(p, cfg.color, p.status === 'complete')).join('')}
      </div>`;
  }

  return `
    <div class="channel-section" id="${channelKey}">
      <div class="channel-header">
        <div class="channel-stripe" style="background:${cfg.color}"></div>
        <div class="channel-title">${cfg.label}</div>
        <div class="channel-meta">${cfg.meta}</div>
        <div class="channel-summary-pills">${pills}</div>
      </div>
      ${rowsHtml}
    </div>`;
}

// ─── Render summary strip ────────────────────────────────────────────────────
function renderSummary(projects) {
  const t1Active    = projects.filter(p => p.tier === 'T1' && p.status !== 'complete').length;
  const t2Active    = projects.filter(p => p.tier === 'T2' && p.status !== 'complete' && p.status !== 'not_started' && p.status !== 'planning').length;
  const openTasks   = projects.reduce((s, p) => s + (p.incomplete_tasks || 0), 0);
  const gmr         = projects.find(p => p.gid === '1213230592066421');
  const nextMilestone = projects
    .flatMap(p => p.upcoming_tasks)
    .filter(t => t.due)
    .sort((a,b) => a.due.localeCompare(b.due))[0];

  const nextDue = nextMilestone
    ? new Date(nextMilestone.due + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' })
    : '—';

  return `
    <div class="summary-strip">
      <div class="summary-card">
        <div class="summary-label">Active T1 Launches</div>
        <div class="summary-number">${t1Active}</div>
        <div class="summary-sub">in flight or upcoming</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Active T2 Initiatives</div>
        <div class="summary-number">${t2Active}</div>
        <div class="summary-sub">in flight</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Next Due</div>
        <div class="summary-number" style="font-size:22px;padding-top:6px">${nextDue}</div>
        <div class="summary-sub">${nextMilestone?.name?.slice(0,30) || '—'}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Open Tasks</div>
        <div class="summary-number">${openTasks}</div>
        <div class="summary-sub">across all active projects</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Growth Refresh</div>
        <div class="summary-number" style="font-size:22px;padding-top:6px">${gmr ? gmr.pct_complete + '%' : '—'}</div>
        <div class="summary-sub">Target: May 15</div>
      </div>
    </div>`;
}

// ─── Update sidebar counts ───────────────────────────────────────────────────
function updateSidebarCounts(byChannel) {
  Object.entries(byChannel).forEach(([key, projects]) => {
    const el = document.getElementById(`count-${key}`);
    if (el) el.textContent = projects.length;
  });
}

// ─── Horizon filter ──────────────────────────────────────────────────────────
function applyFilter(filter) {
  const rows = document.querySelectorAll('.project-row[data-horizon]');
  const dividers = document.querySelectorAll('.horizon-divider');

  if (filter === 'all') {
    rows.forEach(r => r.style.display = '');
    dividers.forEach(d => d.style.display = '');
    // Show all tables
    document.querySelectorAll('.projects-table').forEach(t => {
      t.style.display = '';
      // Show if at least one row visible
    });
    return;
  }

  const map = {
    now:     ['now'],
    soon:    ['soon'],
    future:  ['future'],
    planning:['planning','not_started'],
    complete:['complete'],
  };
  const allowed = map[filter] || [];

  rows.forEach(r => {
    r.style.display = allowed.includes(r.dataset.horizon) ? '' : 'none';
  });

  // Hide dividers + tables that have no visible rows
  document.querySelectorAll('.projects-table').forEach(table => {
    const visibleRows = table.querySelectorAll('.project-row[data-horizon]:not([style*="none"])');
    table.style.display = visibleRows.length ? '' : 'none';
  });
}

// ─── Tab click handler ───────────────────────────────────────────────────────
document.querySelectorAll('.horizon-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.horizon-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    applyFilter(tab.dataset.filter);
  });
});

// ─── Sidebar scroll spy ──────────────────────────────────────────────────────
function initScrollSpy() {
  const sections = document.querySelectorAll('.channel-section');
  const links = document.querySelectorAll('.sidebar-link');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = document.querySelector(`.sidebar-link[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -65% 0px' });
  sections.forEach(s => observer.observe(s));
}

// ─── Main render ─────────────────────────────────────────────────────────────
async function init() {
  const loading = document.getElementById('loading-screen');
  const loadingStatus = document.getElementById('loading-status');
  const errBanner = document.getElementById('error-banner');
  const main = document.getElementById('main-content');

  try {
    loadingStatus.textContent = 'Connecting to Asana…';
    const res = await fetch('/api/projects');

    if (!res.ok) throw new Error(`API returned ${res.status}`);

    loadingStatus.textContent = 'Building dashboard…';
    const { projects, fetched_at, ok } = await res.json();

    if (!ok || !projects) throw new Error('Unexpected API response');

    // Group by channel
    const byChannel = {};
    CHANNEL_ORDER.forEach(c => { byChannel[c] = []; });
    projects.forEach(p => {
      if (byChannel[p.channel]) byChannel[p.channel].push(p);
    });

    // Render
    const summaryHtml = renderSummary(projects);
    const channelsHtml = CHANNEL_ORDER.map(c => renderChannel(c, byChannel[c])).join('');
    main.innerHTML = summaryHtml + channelsHtml;

    updateSidebarCounts(byChannel);

    // Timestamp
    const d = new Date(fetched_at);
    document.getElementById('ts').textContent =
      'Updated ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
      ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    // Check for any fetch errors in individual projects
    const errored = projects.filter(p => p.error);
    if (errored.length) {
      errBanner.style.display = 'block';
      errBanner.textContent = `⚠ ${errored.length} project(s) couldn't be fetched from Asana: ${errored.map(p => p.name).join(', ')}`;
    }

    initScrollSpy();

  } catch (err) {
    errBanner.style.display = 'block';
    errBanner.innerHTML = `<strong>Could not load Asana data.</strong> ${err.message} — Make sure ASANA_TOKEN is set in your Vercel environment variables.`;
    main.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px 0">Dashboard failed to load. Check the error banner above.</p>`;
  } finally {
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 500);
  }
}

init();
</script>
</body>
</html>
